<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas em HTML </title>
</head>
<body>
    <table border="1"> <!-- tag de tabela -->
        <caption>Informações Pessoais</caption> <!-- Legenda da tabela -->
        <thead> <!-- tag de cabeçalho da tabela -->
        <tr>
            <th>Nome</th> <!-- Coluna de cabeçalho de célula -->
            <th>Idade</th> <!-- Coluna de cabeçalho de célula -->
            <th>Cidade</th> <!-- Coluna de cabeçalho de célula -->
        </tr>
        </thead>
        <tbody> <!-- Corpo da tabela-->
        <tr>
            <td>Lucas</td> <!-- Coluna de célula -->
            <td>24</td> <!-- Coluna de célula -->
            <td>São Paulo</td> <!-- Coluna de célula -->
        </tr>

        <tr>
            <td>Sofia</td> <!-- Coluna de célula -->
            <td>22</td> <!-- Coluna de célula -->
            <td>Rio de Janeiro</td> <!-- Coluna de célula -->
        </tr>

        <tr>
            <td>Carlos</td> <!-- Coluna de célula -->
            <td>30</td> <!-- Coluna de célula -->
            <td>Brasília</td> <!-- Coluna de célula -->
        </tr>
        </tbody>

        <tfoot>
        <tr>
            <td colspan="3">Total de Pessoas: 3</td> <!-- Coluna de rodapé de célula -->

        </tfoot>
       
    </table>
    
</body>
</html>
