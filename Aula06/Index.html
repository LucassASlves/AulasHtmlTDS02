<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucas Alves - Desenvolvedor</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #5f7cff, #7b4dff);
    }

    .card {
        background: #eee;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        width: 300px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        overflow: hidden;
        margin: -60px auto 10px;
        border: 4px solid #eee;
    }
    .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .avatar {
        animation: aparecer 1.5s ease;
    }

    h1 {
        margin: 10px 0 5px;
        font-size: 22px;
    }

    .role {
        color: #5f7cff;
        font-weight: bold;
        margin-bottom: 15px;
    }

    p {
        font-size: 14px;
        color: #555;
    }

    .skills {
        margin-top: 20px;
    }

    .skills span {
        display: inline-block;  
        border: 1px solid #ccc;
        padding: 5px 10px;
        border-radius: 15px;
        margin: 5px;
        font-size: 12px;
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 20px;
        background: linear-gradient(135deg, #5f7cff, #7b4dff);
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        opacity: 0.8;
    }

    @keyframes aparecer {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        
        }
    }

    .card {
        animation: aparecer 1s ease;
    }

</style>
</head>

<body>

<div class="card">
    <div class="avatar">
        <img src="assets/foto_perfil.jpg" alt="Foto de Lucas">
    </div>

    <h1>Lucas Alves</h1>
    <div class="role">Desenvolvedor de Software</div>

    <p>
        Apaixonado por tecnologia e desenvolvimento web.
        Busco criar soluções modernas, funcionais e responsivas.
    </p>

    <div class="skills">
        <h3>Habilidades</h3>
        <span>HTML5</span>
        <span>CSS3</span>
        <span>JavaScript</span>
        <span>Flexbox</span>
    </div>

    <a href="mailto:lucas@example.com" class="btn">Entre em Contato</a>
</div>

</body>
</html>
